---
# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: doorbell
version: 0.1.1
slug: doorbell
description: "Orchestrateur IA pour sonnette Somfy : répond automatiquement aux visiteurs via un agent vocal, avec interface de surveillance en temps réel"
url: https://github.com/NicolasRoehm/homeassistant-addons/tree/main/doorbell
startup: application
boot: manual
services:
  - mqtt:need
homeassistant_api: true
hassio_api: false
ingress: true
ingress_port: 3000
init: false
arch:
  - aarch64
  - amd64
options:
  somfy:
    topic_prefix: somfyProtect2mqtt
    site: ""
  openai:
    api_key: ""
    model: gpt-4o-realtime-preview
  ha_notify_target: ""
  github:
    pat: ""
    repo: NicolasRoehm/doorbell
    branch: main
  debug: false
schema:
  somfy:
    topic_prefix: str
    site: str
  openai:
    api_key: password
    model: str
  ha_notify_target: str
  github:
    pat: password
    repo: str
    branch: str
  debug: bool
